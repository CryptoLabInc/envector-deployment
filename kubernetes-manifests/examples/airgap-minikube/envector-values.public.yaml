fullnameOverride: envector

imagePullSecrets: []

busybox:
  image:
    repository: busybox
    tag: "1.36"

endpoint:
  name: endpoint
  image:
    repository: envector-public-prefix/envector-endpoint
    tag: airgap-v4
    pullPolicy: IfNotPresent
  auth:
    enabled: true
    oidcIssuer: https://keycloak.local.test/realms/envector
    allowedAudiences:
      - envector-cli
    roleClaim: envector_roles
    principalClaim: principal_id
    jwksUrl: http://keycloak.auth.svc.cluster.local/realms/envector/protocol/openid-connect/certs
  admin:
    enabled: true

backend:
  name: backend
  image:
    repository: envector-public-prefix/envector-backend
    tag: airgap-v4
    pullPolicy: IfNotPresent

orchestrator:
  name: orchestrator
  image:
    repository: envector-public-prefix/envector-orchestrator
    tag: airgap-v4
    pullPolicy: IfNotPresent
  replicas: 1

compute:
  name: compute
  image:
    repository: envector-public-prefix/envector-compute
    tag: airgap-v4
    pullPolicy: IfNotPresent
  replicas: 1
  license:
    enabled: true
    createSecret: false
    existingSecret: envector-license

shaper:
  enabled: true
  name: shaper
  image:
    repository: envector-public-prefix/envector-shaper
    tag: airgap-v4
    pullPolicy: IfNotPresent

externalServices:
  metadatadb:
    url: "user=envector password=change-me-envector host=metadatadb port=5432 dbname=envector sslmode=disable options='-c search_path=public'"
    schema: public
  storage:
    provider: s3
    host: object-storage
    port: 9000
    user: minioadmin
    password: change-me-minio
    secure: false
    region: us-east-1
    create: false
    bucket_name: envector
    hasHealthcheckEndpoint: true

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: local-root-ca
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
  hosts:
    - host: envector.local.test
      paths:
        - path: /
          pathType: Prefix
          service:
            name: endpoint
            port: 50050
  tls:
    - secretName: envector-endpoint-tls
      hosts:
        - envector.local.test
