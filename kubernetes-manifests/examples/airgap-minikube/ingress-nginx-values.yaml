controller:
  replicaCount: 1
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443
  service:
    type: ClusterIP
  ingressClass: nginx
  ingressClassResource:
    name: nginx
    default: true
  image:
    registry: registry.local:5000
    image: ingress-nginx/controller
    digest: ""
  admissionWebhooks:
    enabled: true
    patch:
      enabled: true
      image:
        registry: registry.local:5000
        image: ingress-nginx/kube-webhook-certgen
        digest: ""

defaultBackend:
  enabled: false
