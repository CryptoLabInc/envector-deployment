global:
  imageRegistry: registry.local:5000
  imagePullSecrets: []
  security:
    allowInsecureImages: true

fullnameOverride: keycloak

auth:
  adminUser: kcadmin
  adminPassword: change-me-kcadmin

production: true
proxyHeaders: xforwarded
httpEnabled: true
hostnameStrict: true

service:
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak.local.test
  pathType: Prefix
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: local-root-ca
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

postgresql:
  enabled: true
  image:
    tag: 17.6.0-debian-12-r0
  auth:
    postgresPassword: change-me-kcadmin
    username: keycloak
    password: change-me-kcadmin
    database: keycloak
