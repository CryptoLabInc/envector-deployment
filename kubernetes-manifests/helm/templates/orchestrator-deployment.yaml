{{- $electionBackend := .Values.orchestrator.election.backend | default "k8s-lease" }}
{{- $orchestratorLeaderOnlyHA := and (eq $electionBackend "k8s-lease") (gt (int (.Values.orchestrator.replicas | default 1)) 1) }}
# Headless service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.orchestratorName" . }}{{ .Values.orchestrator.service.headlessSuffix }}
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: {{ include "envector-chart.orchestratorName" . }}
spec:
  clusterIP: None # Headless service
  ports:
    - port: {{ .Values.orchestrator.service.port | default 25121 }}
  selector:
    app: {{ include "envector-chart.fullname" . }}
    component: {{ include "envector-chart.orchestratorName" . }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.orchestratorName" . }}
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: {{ include "envector-chart.orchestratorName" . }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.orchestrator.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.orchestratorName" . }}{{ .Values.orchestrator.service.headlessSuffix }}
  replicas: {{ .Values.orchestrator.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "envector-chart.fullname" . }}
      component: {{ include "envector-chart.orchestratorName" . }}
      {{- with .Values.labels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.orchestrator.labels }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and (not .Values.externalSecrets.dbSecret.enabled) (eq (.Values.existingSecrets.dbSecret | default "") "") }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secret-db.yaml") . | sha256sum }}
        {{- end }}
        {{- if and (ne (.Values.externalServices.storage.provider | default "s3") "gcs") (not .Values.externalSecrets.storageSecret.enabled) (eq (.Values.existingSecrets.storageSecret | default "") "") }}
        checksum/secret-storage: {{ include (print $.Template.BasePath "/secret-storage.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app: {{ include "envector-chart.fullname" . }}
        component: {{ include "envector-chart.orchestratorName" . }}
        {{- with .Values.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.orchestrator.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.reportingSecret }}
        goog-partner-solution: isol_plb32_001kf00001cpdexiax_z2tshwkesg6ard35ayqkkenlgep7kpvo
        {{- end }}
    spec:
      serviceAccountName: {{ include "envector-chart.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default true }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.orchestrator.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if or .Values.orchestrator.affinity $orchestratorLeaderOnlyHA }}
      affinity:
        {{- if .Values.orchestrator.affinity }}
        {{- toYaml .Values.orchestrator.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: {{ include "envector-chart.fullname" . }}
                    component: {{ include "envector-chart.orchestratorName" . }}
        {{- end }}
      {{- end }}
      {{- if .Values.orchestrator.tolerations }}
      tolerations:
        {{- toYaml .Values.orchestrator.tolerations | nindent 8 }}
      {{- end }}
      {{- if or (eq (toString .Values.embeddedPostgres.enabled) "true") (eq (toString .Values.embeddedMinio.enabled) "true") }}
      initContainers:
        {{- if eq (toString .Values.embeddedPostgres.enabled) "true" }}
        - name: wait-postgres
          image: "{{ .Values.busybox.image.repository }}:{{ .Values.busybox.image.tag }}"
          command: ["sh", "-c", "until nc -z {{ include "envector-chart.fullname" . }}-embedded-pg 5432; do echo waiting for postgres; sleep 2; done"]
        {{- end }}
        {{- if eq (toString .Values.embeddedMinio.enabled) "true" }}
        - name: wait-minio
          image: "{{ .Values.busybox.image.repository }}:{{ .Values.busybox.image.tag }}"
          command: ["sh", "-c", "until nc -z {{ include "envector-chart.fullname" . }}-embedded-minio 9000; do echo waiting for minio; sleep 2; done"]
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "envector-chart.orchestratorName" . }}
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.orchestrator.service.port | default 25121 }}
            - name: http-health
              containerPort: {{ .Values.orchestrator.health.port }}
          {{- if .Values.orchestrator.health.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.orchestrator.health.liveness.path }}
              port: http-health
            initialDelaySeconds: {{ .Values.orchestrator.health.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestrator.health.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.orchestrator.health.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.orchestrator.health.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              {{- if $orchestratorLeaderOnlyHA }}
              path: /health/pod-ready
              {{- else }}
              path: {{ .Values.orchestrator.health.readiness.path }}
              {{- end }}
              port: http-health
            initialDelaySeconds: {{ .Values.orchestrator.health.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.orchestrator.health.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.orchestrator.health.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.orchestrator.health.readiness.failureThreshold }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "envector-chart.fullname" . }}-storage-config
            - configMapRef:
                name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.orchestratorName" . }}-config
            {{- if .Values.observability.enabled }}
            - configMapRef:
                name: {{ include "envector-chart.fullname" . }}-otel-config
            {{- end }}
            - secretRef:
                name: {{ include "envector-chart.dbSecretName" . }}
            {{- if ne (.Values.externalServices.storage.provider | default "s3") "gcs" }}
            - secretRef:
                name: {{ include "envector-chart.storageSecretName" . }}
            {{- end }}
          env:
            - name: ENVECTOR_ORCHESTRATOR_PORT
              value: {{ .Values.orchestrator.service.port | default 25121 | quote }}
            - name: ENVECTOR_COMPUTE_HA_BACKEND
              # Mirror the effective compute HA backend: opt-in k8s-lease only
              # takes effect when compute.replicas >= 2 (compute-deployment.yaml).
              value: {{ if and (eq (.Values.compute.election.backend | default "") "k8s-lease") (gt (int (.Values.compute.replicas | default 1)) 1) }}{{ .Values.compute.election.backend | default "" | quote }}{{ else }}""{{ end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: ENVECTOR_ORCHESTRATOR_KUBE_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name # "envector-orchestrator-0", "envector-orchestrator-1", ...
            - name: ENVECTOR_ORCHESTRATOR_KUBE_SERVICE
              value: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.orchestratorName" . }}{{ .Values.orchestrator.service.headlessSuffix }}
            - name: ENVECTOR_ORCHESTRATOR_ELECTION_BACKEND
              value: {{ $electionBackend | quote }}
            - name: ENVECTOR_ORCHESTRATOR_LOCK_ID
              value: {{ .Values.orchestrator.election.lockID | quote }}
            - name: ENVECTOR_ORCHESTRATOR_LEASE_NAME
              value: {{ .Values.orchestrator.election.leaseName | default "envector-orchestrator" | quote }}
            - name: ENVECTOR_ORCHESTRATOR_LEASE_DURATION_SECONDS
              value: {{ .Values.orchestrator.election.leaseDurationSeconds | default 6 | quote }}
            - name: ENVECTOR_ORCHESTRATOR_RENEW_DEADLINE_SECONDS
              value: {{ .Values.orchestrator.election.renewDeadlineSeconds | default 4 | quote }}
            - name: ENVECTOR_ORCHESTRATOR_RETRY_PERIOD_SECONDS
              value: {{ .Values.orchestrator.election.retryPeriodSeconds | default 1 | quote }}
            - name: ENVECTOR_HTTP_HEALTH_PORT
              value: {{ .Values.orchestrator.health.port | quote }}
            {{- if .Values.observability.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "envector-chart.orchestratorName" . | quote }}
            {{- end }}
          {{- if .Values.orchestrator.resources }}
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          {{- end }}
