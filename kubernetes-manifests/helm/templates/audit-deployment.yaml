{{- if .Values.audit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.auditName" . }}
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: {{ include "envector-chart.auditName" . }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.audit.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "envector-chart.fullname" . }}
      component: {{ include "envector-chart.auditName" . }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/audit-configmap.yaml") . | sha256sum }}
      labels:
        app: {{ include "envector-chart.fullname" . }}
        component: {{ include "envector-chart.auditName" . }}
        {{- with .Values.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.audit.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "envector-chart.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default true }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.audit.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.audit.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.audit.affinity }}
      affinity:
        {{- toYaml .Values.audit.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.audit.tolerations }}
      tolerations:
        {{- toYaml .Values.audit.tolerations | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-logmq
          image: "{{ .Values.busybox.image.repository }}:{{ .Values.busybox.image.tag }}"
          command:
            - sh
            - -c
            - >-
              until nc -z -w 2 {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.auditLogmqName" . }} 9092; do echo waiting for redpanda; sleep 2; done
      containers:
        - name: {{ include "envector-chart.auditName" . }}
          image: "{{ .Values.audit.image.repository }}:{{ .Values.audit.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.audit.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: grpc
              containerPort: {{ .Values.audit.service.port | default 50052 }}
          envFrom:
            - configMapRef:
                name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.auditName" . }}-config
          {{- if ne (.Values.externalServices.storage.provider | default "s3") "gcs" }}
          env:
            - name: ENVECTOR_STORAGE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "envector-chart.storageSecretName" . }}
                  key: ENVECTOR_STORAGE_USER
            - name: ENVECTOR_STORAGE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "envector-chart.storageSecretName" . }}
                  key: ENVECTOR_STORAGE_PASSWORD
          {{- end }}
          {{- if .Values.audit.resources }}
          resources:
            {{- toYaml .Values.audit.resources | nindent 12 }}
          {{- end }}
{{- end }}
