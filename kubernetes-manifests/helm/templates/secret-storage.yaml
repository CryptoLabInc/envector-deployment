{{- /* Creates Secret for storage credentials when externalSecrets.storageSecret is disabled and existingSecrets.storageSecret is not set */ -}}
{{- if and (not .Values.externalSecrets.storageSecret.enabled) (eq (.Values.existingSecrets.storageSecret | default "") "") }}
{{- $defaultSecretName := printf "%s-storage-secret" (include "envector-chart.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $defaultSecretName }}
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: storage-secret
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  ENVECTOR_STORAGE_USER: {{ .Values.externalServices.storage.user | default "" | quote }}
  ENVECTOR_STORAGE_PASSWORD: {{ .Values.externalServices.storage.password | default "" | quote }}
{{- end }}
