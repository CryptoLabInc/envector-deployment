{{- /* Creates Secret for storage credentials when using S3-compatible storage.
     Skipped when provider=gcs (GCS uses workload identity, no access keys needed). */ -}}
{{- if and (ne (.Values.externalServices.storage.provider | default "s3") "gcs") (not .Values.externalSecrets.storageSecret.enabled) (eq (.Values.existingSecrets.storageSecret | default "") "") }}
{{- $defaultSecretName := printf "%s-storage-secret" (include "envector-chart.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $defaultSecretName }}
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: storage-secret
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  {{- if eq (toString .Values.embeddedMinio.enabled) "true" }}
  ENVECTOR_STORAGE_USER: {{ .Values.embeddedMinio.rootUser | quote }}
  ENVECTOR_STORAGE_PASSWORD: {{ .Values.embeddedMinio.rootPassword | quote }}
  {{- else }}
  ENVECTOR_STORAGE_USER: {{ .Values.externalServices.storage.user | default "" | quote }}
  ENVECTOR_STORAGE_PASSWORD: {{ .Values.externalServices.storage.password | default "" | quote }}
  {{- end }}
{{- end }}
