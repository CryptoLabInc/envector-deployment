{{- if eq (toString .Values.embeddedPostgres.enabled) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "envector-chart.fullname" . }}-embedded-pg
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: embedded-postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.embeddedPostgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.embeddedPostgres.password | quote }}
  POSTGRES_DB: {{ .Values.embeddedPostgres.database | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "envector-chart.fullname" . }}-embedded-pg
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: embedded-postgres
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: {{ include "envector-chart.fullname" . }}
    component: embedded-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "envector-chart.fullname" . }}-embedded-pg
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: embedded-postgres
spec:
  serviceName: {{ include "envector-chart.fullname" . }}-embedded-pg
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "envector-chart.fullname" . }}
      component: embedded-postgres
  template:
    metadata:
      labels:
        app: {{ include "envector-chart.fullname" . }}
        component: embedded-postgres
    spec:
      serviceAccountName: {{ include "envector-chart.serviceAccountName" . }}
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 999
      containers:
        - name: postgres
          image: "{{ .Values.embeddedPostgres.image.repository }}:{{ .Values.embeddedPostgres.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ include "envector-chart.fullname" . }}-embedded-pg
          env:
            # PGDATA must be a SUBDIR of the mounted PVC. The postgres image
            # declares VOLUME /var/lib/postgresql/data, which (when the PVC is
            # mounted at the parent) gets an ephemeral overlay at that subpath,
            # shadowing the PVC — so data lands on the node disk and is LOST on
            # any pod restart. Mounting the PVC AT the VOLUME path and pointing
            # PGDATA at a subdir keeps data on the PVC (and avoids initdb
            # tripping over the lost+found at the mount root).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            {{- with .Values.embeddedPostgres.resources }}
            {{- toYaml . | nindent 12 }}
            {{- else }}
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              # >50K-vector metadata peaks ~530 MB; 512Mi would OOMKill pg.
              memory: 1Gi
            {{- end }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.embeddedPostgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.embeddedPostgres.storage.size | default "1Gi" }}
        {{- if .Values.embeddedPostgres.storage.storageClassName }}
        storageClassName: {{ .Values.embeddedPostgres.storage.storageClassName | quote }}
        {{- end }}
{{- end }}
