{{- /*
  Lease Role/RoleBinding only render when active-standby HA is actually
  in effect: backend must be k8s-lease AND replicas must be >= 2. Mirrors
  $computeLeaderOnlyHA in compute-deployment.yaml so a single-replica
  install does not create unused RBAC that the cleanup test would flag.
*/ -}}
{{- if and (eq (.Values.compute.election.backend | default "") "k8s-lease") (gt (int (.Values.compute.replicas | default 1)) 1) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.computeName" . }}-lease
  labels:
    app: {{ include "envector-chart.fullname" . }}
    {{- include "envector-chart.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.computeName" . }}-lease
  labels:
    app: {{ include "envector-chart.fullname" . }}
    {{- include "envector-chart.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "envector-chart.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "envector-chart.fullname" . }}-{{ include "envector-chart.computeName" . }}-lease
{{- end }}
