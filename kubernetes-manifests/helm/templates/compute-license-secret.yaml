{{- /* Creates or updates the license Secret when enabled. Reuses existing Secret if token not provided. */ -}}
{{- if and .Values.compute.license.enabled .Values.compute.license.createSecret (not .Values.compute.license.existingSecret) (not .Values.externalSecrets.enabled) }}
{{- $defaultSecretName := printf "%s-%s-license" (include "envector-chart.fullname" .) (include "envector-chart.computeName" .) -}}
{{- $secretName := (default $defaultSecretName .Values.compute.license.secret.name) -}}
{{- $key := (.Values.compute.license.secret.key | default "token.jwt") -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $hasToken := (not (empty .Values.compute.license.token)) -}}
{{- if and (not $hasToken) (not $existing) -}}
  {{- fail "compute.license.token is required on first install when createSecret=true" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: {{ include "envector-chart.fullname" . }}
    component: {{ include "envector-chart.computeName" . }}
type: Opaque
{{- if $hasToken }}
stringData:
  {{ $key }}: |-
    {{- .Values.compute.license.token | nindent 4 }}
{{- else }}
  {{- if hasKey $existing.data $key }}
data:
  {{ $key }}: {{ index $existing.data $key | quote }}
  {{- else -}}
  {{- fail (printf "Existing secret %s missing key %s" $secretName $key) -}}
  {{- end }}
{{- end }}
{{- end }}
