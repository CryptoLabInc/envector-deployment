# docker-compose.envector.yml
services:
  envector-endpoint:
    image: "${ENVECTOR_ENDPOINT_IMAGE_NAME:-envector-endpoint}:${ENVECTOR_ENDPOINT_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    ports:
      - ${ENVECTOR_ENDPOINT_HOST_PORT:-50050}:${ENVECTOR_ENDPOINT_PORT:-50050}
    environment:
      ENVECTOR_BACKEND_ADDR: "envector-backend:${ENVECTOR_BACKEND_PORT:-50051}"
      ENVECTOR_ENDPOINT_PORT: "${ENVECTOR_ENDPOINT_PORT:-50050}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_ENDPOINT_HOST_PORT: "${ENVECTOR_ENDPOINT_HOST_PORT:-50050}"
      AUDIT_LOG_DIR: "${AUDIT_LOG_DIR:-/var/log/envector/audit}"
      AUDIT_LOG_INCLUDE_IDENTITY_CLAIMS: "${AUDIT_LOG_INCLUDE_IDENTITY_CLAIMS:-false}"
    # Optional: persist audit logs to the host for local development.
    # volumes:
    #   - "./audit:${AUDIT_LOG_DIR:-/var/log/envector/audit}"
    depends_on:
      - "envector-backend"
    restart: always

  envector-backend:
    image: "${ENVECTOR_BACKEND_IMAGE_NAME:-envector-backend}:${ENVECTOR_BACKEND_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    environment:
      ENVECTOR_BACKEND_PORT: "${ENVECTOR_BACKEND_PORT:-50051}"
      ENVECTOR_ORCHESTRATOR_ADDRESS: "envector-orchestrator:${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_DB_URL: "postgresql://${ENVECTOR_DB_USER:-postgres}:${ENVECTOR_DB_PASSWORD:-.}@metadatadb:${ENVECTOR_DB_PORT:-5432}/${ENVECTOR_DB_NAME:-mydatabase}?sslmode=${ENVECTOR_DB_SSL:-disable}"
      ENVECTOR_STORAGE_PROVIDER: "${ENVECTOR_STORAGE_PROVIDER:-s3}"
      ENVECTOR_STORAGE_ADDRESS: "storage:${ENVECTOR_STORAGE_PORT:-59000}"
      ENVECTOR_STORAGE_USER: "${ENVECTOR_STORAGE_USER:-minioadmin}"
      ENVECTOR_STORAGE_PASSWORD: "${ENVECTOR_STORAGE_PASSWORD:-.}"
      ENVECTOR_STORAGE_SECURE: "${ENVECTOR_STORAGE_SECURE:-false}"
      ENVECTOR_STORAGE_BUCKET_NAME: "${ENVECTOR_STORAGE_BUCKET_NAME:-envector}"
      ENVECTOR_STORAGE_CREATE_BUCKET: "${ENVECTOR_STORAGE_CREATE_BUCKET:-true}"
      ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT: "${ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT:-true}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_MAX_NUM_VECTORS_PER_SHARD: "${ENVECTOR_MAX_NUM_VECTORS_PER_SHARD:-4096}"
    restart: always

  envector-orchestrator:
    image: "${ENVECTOR_ORCHESTRATOR_IMAGE_NAME:-envector-orchestrator}:${ENVECTOR_ORCHESTRATOR_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    environment:
      ENVECTOR_ORCHESTRATOR_PORT: "${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      # Orchestrator DB
      ENVECTOR_DB_URL: "postgresql://${ENVECTOR_DB_USER:-postgres}:${ENVECTOR_DB_PASSWORD:-.}@metadatadb:${ENVECTOR_DB_PORT:-5432}/${ENVECTOR_DB_NAME:-mydatabase}?sslmode=${ENVECTOR_DB_SSL:-disable}"
      # Orchestrator Storage
      ENVECTOR_STORAGE_PROVIDER: "${ENVECTOR_STORAGE_PROVIDER:-s3}"
      ENVECTOR_STORAGE_ADDRESS: "storage:${ENVECTOR_STORAGE_PORT:-59000}"
      ENVECTOR_STORAGE_USER: "${ENVECTOR_STORAGE_USER:-minioadmin}"
      ENVECTOR_STORAGE_PASSWORD: "${ENVECTOR_STORAGE_PASSWORD:-.}"
      ENVECTOR_STORAGE_SECURE: "${ENVECTOR_STORAGE_SECURE:-false}"
      ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT: "${ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT:-true}"
      ENVECTOR_STORAGE_BUCKET_NAME: "${ENVECTOR_STORAGE_BUCKET_NAME:-envector}"
    restart: always

  envector-compute:
    image: "${ENVECTOR_COMPUTE_IMAGE_NAME:-envector-compute}:${ENVECTOR_COMPUTE_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    command: []
    environment:
      USE_GPU: "false"
      ENVECTOR_COMPUTE_PORT: "${ENVECTOR_COMPUTE_PORT:-25123}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_ORCHESTRATOR_ADDRESS: "envector-orchestrator:${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_THREAD_POOL_SCALE: "${ENVECTOR_THREAD_POOL_SCALE:-4}"
      ENVECTOR_NUM_SEARCH_HANDLER: "${ENVECTOR_NUM_SEARCH_HANDLER:-10}"
      ENVECTOR_LICENSE_TOKEN: "${ENVECTOR_LICENSE_TOKEN:-/envector/license/token.jwt}"
      NUM_SEARCH_WORKERS: "${NUM_SEARCH_WORKERS:-30}"
    # License file mount. Place your license token.jwt file in the same directory as this docker-compose file.
    volumes:
      - ./token.jwt:/envector/license/token.jwt
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '16.0'
    #       memory: 32G
    #     reservations:
    #       cpus: '8.0'
    #       memory: 16G
    restart: always
    depends_on:
      - "envector-orchestrator"

networks:
  default:
