# docker-compose.envector.yml
services:
  envector-endpoint:
    image: "${ENVECTOR_ENDPOINT_IMAGE_NAME:-envector-endpoint}:${ENVECTOR_ENDPOINT_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    ports:
      - ${ENVECTOR_ENDPOINT_HOST_PORT:-50050}:${ENVECTOR_ENDPOINT_PORT:-50050}
      - ${ENVECTOR_HTTP_HEALTH_HOST_PORT:-18080}:${ENVECTOR_HTTP_HEALTH_PORT:-8080}
    environment:
      ENVECTOR_BACKEND_ADDRESS: "envector-backend:${ENVECTOR_BACKEND_PORT:-50051}"
      ENVECTOR_ORCHESTRATOR_ADDRESS: "envector-orchestrator:${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_ENDPOINT_PORT: "${ENVECTOR_ENDPOINT_PORT:-50050}"
      ENVECTOR_HTTP_HEALTH_PORT: "${ENVECTOR_HTTP_HEALTH_PORT:-8080}"
      ENVECTOR_ENDPOINT_HOST_PORT: "${ENVECTOR_ENDPOINT_HOST_PORT:-50050}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_ADMIN_API_ENABLED: "${ENVECTOR_ADMIN_API_ENABLED:-true}"
      # Auth
      ENVECTOR_AUTH_OIDC_ISSUER: "${ENVECTOR_AUTH_OIDC_ISSUER:-}"
      ENVECTOR_AUTH_ALLOWED_AUDIENCES: "${ENVECTOR_AUTH_ALLOWED_AUDIENCES:-}"
      ENVECTOR_AUTH_ROLE_CLAIM: "${ENVECTOR_AUTH_ROLE_CLAIM:-envector_roles}"
      ENVECTOR_AUTH_PRINCIPAL_CLAIM: "${ENVECTOR_AUTH_PRINCIPAL_CLAIM:-principal_id}"
      ENVECTOR_AUTH_JWKS_URL: "${ENVECTOR_AUTH_JWKS_URL:-}"
      ENVECTOR_AUTH_CAPABILITY_POLICY_JSON: "${ENVECTOR_AUTH_CAPABILITY_POLICY_JSON:-}"
      ENVECTOR_JWT_LEEWAY_SECONDS: "${ENVECTOR_JWT_LEEWAY_SECONDS:-0}"
    # Optional: persist audit logs to the host for local development.
    # volumes:
    #   - "./audit:${AUDIT_LOG_DIR:-/var/log/envector/audit}"
    depends_on:
      - "envector-backend"
    restart: on-failure:10

  envector-shaper:
    image: "${ENVECTOR_SHAPER_IMAGE_NAME:-envector-shaper}:${ENVECTOR_SHAPER_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    init: true
    environment:
      ENVECTOR_SHAPER_PORT: "${ENVECTOR_SHAPER_PORT:-50056}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_LICENSE_TOKEN: "${ENVECTOR_LICENSE_TOKEN:-/envector/license/token.jwt}"
      # Storage
      ENVECTOR_STORAGE_PROVIDER: "${ENVECTOR_STORAGE_PROVIDER:-s3}"
      ENVECTOR_STORAGE_ADDRESS: "${ENVECTOR_STORAGE_ADDRESS:-storage:${ENVECTOR_STORAGE_PORT:-59000}}"
      ENVECTOR_STORAGE_USER: "${ENVECTOR_STORAGE_USER:-minioadmin}"
      ENVECTOR_STORAGE_PASSWORD: "${ENVECTOR_STORAGE_PASSWORD:-.}"
      ENVECTOR_STORAGE_SECURE: "${ENVECTOR_STORAGE_SECURE:-false}"
      ENVECTOR_STORAGE_REGION: "${ENVECTOR_STORAGE_REGION:-us-east-1}"
      ENVECTOR_STORAGE_BUCKET_NAME: "${ENVECTOR_STORAGE_BUCKET_NAME:-envector}"
      # Limit glibc malloc arenas to prevent memory retention (default: 8 * num_cpus)
      MALLOC_ARENA_MAX: "2"
      # Development settings
      ENVECTOR_SHAPER_MAX_WORKERS: "${ENVECTOR_SHAPER_MAX_WORKERS:-1}"
      ENVECTOR_SHAPER_SPLIT_UPLOAD_CONCURRENCY: "${ENVECTOR_SHAPER_SPLIT_UPLOAD_CONCURRENCY:-1}"
      ENVECTOR_SHAPER_MERGE_DOWNLOAD_CONCURRENCY: "${ENVECTOR_SHAPER_MERGE_DOWNLOAD_CONCURRENCY:-1}"
      ENVECTOR_SHAPER_CLEANUP_PERIOD: "${ENVECTOR_SHAPER_CLEANUP_PERIOD:-1h}"
      ENVECTOR_SHAPER_JOB_TTL: "${ENVECTOR_SHAPER_JOB_TTL:-24h}"
    # License file mount. Place your license token.jwt file in the same directory as this docker-compose file.
    volumes:
      - ${START_ENVECTOR_COMPOSE_DIR:-.}/token.jwt:/envector/license/token.jwt
    restart: on-failure:10

  envector-backend:
    image: "${ENVECTOR_BACKEND_IMAGE_NAME:-envector-backend}:${ENVECTOR_BACKEND_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    environment:
      ENVECTOR_BACKEND_PORT: "${ENVECTOR_BACKEND_PORT:-50051}"
      ENVECTOR_ORCHESTRATOR_ADDRESS: "envector-orchestrator:${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_SHAPER_ADDRESS: "envector-shaper:${ENVECTOR_SHAPER_PORT:-50056}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_BACKEND_ELECTION_BACKEND: "${ENVECTOR_BACKEND_ELECTION_BACKEND:-single-node}"
      # DB
      ENVECTOR_DB_URL: "${ENVECTOR_DB_URL:-postgresql://${ENVECTOR_DB_USER:-postgres}:${ENVECTOR_DB_PASSWORD:-.}@${ENVECTOR_DB_ADDRESS:-${ENVECTOR_DB_HOST:-metadatadb}:${ENVECTOR_DB_PORT:-5432}}/${ENVECTOR_DB_NAME:-mydatabase}?sslmode=${ENVECTOR_DB_SSL:-disable}}"
      ENVECTOR_DB_SCHEMA: "${ENVECTOR_DB_SCHEMA:-public}"
      # Storage
      ENVECTOR_STORAGE_PROVIDER: "${ENVECTOR_STORAGE_PROVIDER:-s3}"
      ENVECTOR_STORAGE_ADDRESS: "${ENVECTOR_STORAGE_ADDRESS:-storage:${ENVECTOR_STORAGE_PORT:-59000}}"
      ENVECTOR_STORAGE_USER: "${ENVECTOR_STORAGE_USER:-minioadmin}"
      ENVECTOR_STORAGE_PASSWORD: "${ENVECTOR_STORAGE_PASSWORD:-.}"
      ENVECTOR_STORAGE_SECURE: "${ENVECTOR_STORAGE_SECURE:-false}"
      ENVECTOR_STORAGE_REGION: "${ENVECTOR_STORAGE_REGION:-us-east-1}"
      ENVECTOR_STORAGE_BUCKET_NAME: "${ENVECTOR_STORAGE_BUCKET_NAME:-envector}"
      ENVECTOR_STORAGE_CREATE_BUCKET: "${ENVECTOR_STORAGE_CREATE_BUCKET:-true}"
      ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT: "${ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT:-true}"
      # Development settings
      ENVECTOR_MAX_NUM_VECTORS_PER_SHARD: "${ENVECTOR_MAX_NUM_VECTORS_PER_SHARD:-4096}"
      CTXTMAP_READ_BATCH_SIZE: "${CTXTMAP_READ_BATCH_SIZE:-4096}"
      CTXTMAP_WRITE_BATCH_SIZE: "${CTXTMAP_WRITE_BATCH_SIZE:-4096}"
      ENVECTOR_CLEANUP_GRACE_PERIOD: "${ENVECTOR_CLEANUP_GRACE_PERIOD:-5m}"
      VCT_CAPACITY: "${VCT_CAPACITY:-4096}"
      ENVECTOR_BASELINE_INSERTABLE_SHARDS: "${ENVECTOR_BASELINE_INSERTABLE_SHARDS:-8}"
      # Cap concurrent shard loads issued by LoadIndex to bound compute peak
      ENVECTOR_LOAD_INDEX_SHARD_CONCURRENCY: "${ENVECTOR_LOAD_INDEX_SHARD_CONCURRENCY:-32}"
    restart: on-failure:10
    depends_on:
      - envector-shaper

  envector-orchestrator:
    image: "${ENVECTOR_ORCHESTRATOR_IMAGE_NAME:-envector-orchestrator}:${ENVECTOR_ORCHESTRATOR_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    environment:
      ENVECTOR_ORCHESTRATOR_PORT: "${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      # Orchestrator DB
      ENVECTOR_DB_URL: "${ENVECTOR_DB_URL:-postgresql://${ENVECTOR_DB_USER:-postgres}:${ENVECTOR_DB_PASSWORD:-.}@${ENVECTOR_DB_ADDRESS:-${ENVECTOR_DB_HOST:-metadatadb}:${ENVECTOR_DB_PORT:-5432}}/${ENVECTOR_DB_NAME:-mydatabase}?sslmode=${ENVECTOR_DB_SSL:-disable}}"
      # Orchestrator Storage
      ENVECTOR_STORAGE_PROVIDER: "${ENVECTOR_STORAGE_PROVIDER:-s3}"
      ENVECTOR_STORAGE_ADDRESS: "${ENVECTOR_STORAGE_ADDRESS:-storage:${ENVECTOR_STORAGE_PORT:-59000}}"
      ENVECTOR_STORAGE_USER: "${ENVECTOR_STORAGE_USER:-minioadmin}"
      ENVECTOR_STORAGE_PASSWORD: "${ENVECTOR_STORAGE_PASSWORD:-.}"
      ENVECTOR_STORAGE_SECURE: "${ENVECTOR_STORAGE_SECURE:-false}"
      ENVECTOR_STORAGE_REGION: "${ENVECTOR_STORAGE_REGION:-us-east-1}"
      ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT: "${ENVECTOR_STORAGE_HAS_HEALTHCHECK_ENDPOINT:-true}"
      ENVECTOR_STORAGE_BUCKET_NAME: "${ENVECTOR_STORAGE_BUCKET_NAME:-envector}"
    restart: on-failure:10

  envector-compute:
    image: "${ENVECTOR_COMPUTE_IMAGE_NAME:-envector-compute}:${ENVECTOR_COMPUTE_TAG:-latest}"
    pull_policy: "${PULL_POLICY:-always}"
    init: true
    command: []
    environment:
      USE_GPU: "false"
      ENVECTOR_COMPUTE_PORT: "${ENVECTOR_COMPUTE_PORT:-25123}"
      ENVECTOR_ORCHESTRATOR_ADDRESS: "envector-orchestrator:${ENVECTOR_ORCHESTRATOR_PORT:-25121}"
      ENVECTOR_LOG_LEVEL: "${ENVECTOR_LOG_LEVEL:-INFO}"
      ENVECTOR_LICENSE_TOKEN: "${ENVECTOR_LICENSE_TOKEN:-/envector/license/token.jwt}"
      # Limit glibc malloc arenas to prevent memory retention from per-thread
      # arenas under heavy CGO/EVI allocation (default: 8 * num_cpus).
      MALLOC_ARENA_MAX: "${MALLOC_ARENA_MAX:-2}"
      # Development settings
      NUM_SEARCH_WORKERS: "${NUM_SEARCH_WORKERS:-4}"
      ENVECTOR_THREAD_POOL_SCALE: "${ENVECTOR_THREAD_POOL_SCALE:-4}"
    # License file mount. Place your license token.jwt file in the same directory as this docker-compose file.
    volumes:
      - ${START_ENVECTOR_COMPOSE_DIR:-.}/token.jwt:/envector/license/token.jwt
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 24G
        reservations:
          cpus: '2.0'
          memory: 16G
    restart: on-failure:10
    depends_on:
      - "envector-orchestrator"

networks:
  default:
