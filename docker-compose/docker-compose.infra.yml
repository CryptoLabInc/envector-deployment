# docker-compose.infra.yml
services:
  metadatadb:
    image: postgres:14.9
    restart: always
    command: ["postgres", "-c", "max_wal_size=8GB", "-c", "checkpoint_timeout=10min", "-c", "max_connections=1000"]
    # volumes:
    #   - ${DOCKER_VOLUME_DIRECTORY:-./volumes}/pgdata:/var/lib/postgresql/data
    # ports:
    #   - ${ENVECTOR_DB_PORT:-5432}:5432
    environment:
      - POSTGRES_USER=${ENVECTOR_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${ENVECTOR_DB_PASSWORD:-.}
      - POSTGRES_DB=${ENVECTOR_DB_NAME:-mydatabase}
      - POSTGRES_SCHEMA=${ENVECTOR_DB_SCHEMA:-public}

  storage:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${ENVECTOR_STORAGE_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ENVECTOR_STORAGE_PASSWORD:-.}
    command: server /data --address ":${ENVECTOR_STORAGE_PORT:-59000}" --console-address ":${ENVECTOR_STORAGE_CONSOLE_PORT:-59001}"
    # volumes:
    #   - ${DOCKER_VOLUME_DIRECTORY:-./volumes}/minio/data:/data
    # ports:
    #   - ${ENVECTOR_STORAGE_PORT:-59000}:${ENVECTOR_STORAGE_PORT:-59000}
    #   - ${ENVECTOR_STORAGE_CONSOLE_PORT:-59001}:${ENVECTOR_STORAGE_CONSOLE_PORT:-59001}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ENVECTOR_STORAGE_PORT:-59000}/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 5

  envector-backend:
    depends_on:
      storage:
        condition: service_healthy
      metadatadb:
        condition: service_started

  envector-orchestrator:
    depends_on:
      storage:
        condition: service_healthy
      metadatadb:
        condition: service_started

  envector-shaper:
    depends_on:
      storage:
        condition: service_healthy

networks:
  default:
