# docker-compose.audit.yml
# By default the audit overlay reuses the shared `storage` service from
# docker-compose.infra.yml. To isolate audit storage, set the audit-specific
# ENV vars below and uncomment the `audit-storage` example service.
services:
  envector-endpoint:
    environment:
      AUDIT_LOG_SINK: "${AUDIT_LOG_SINK:-file}"
      AUDIT_LOG_DIR: "${AUDIT_LOG_DIR:-/var/log/envector/audit}"
      AUDIT_LOG_INCLUDE_IDENTITY_CLAIMS: "${AUDIT_LOG_INCLUDE_IDENTITY_CLAIMS:-false}"
    volumes:
      - auditlogs:${AUDIT_LOG_DIR:-/var/log/envector/audit}
    depends_on:
      audit-logmq:
        condition: service_healthy
      audit-logagent:
        condition: service_started

  audit:
    image: "${ENVECTOR_AUDIT_IMAGE_NAME:-envector-audit}:${ENVECTOR_AUDIT_TAG:-latest}"
    restart: on-failure:10
    ports:
      - "${ENVECTOR_AUDIT_HOST_PORT:-50052}:${ENVECTOR_AUDIT_PORT:-50052}"
      - "${ENVECTOR_AUDIT_HTTP_HOST_PORT:-58052}:${ENVECTOR_AUDIT_HTTP_PORT:-58052}"
    extra_hosts:
        - "host.docker.internal:host-gateway"
    environment:
      ENVECTOR_AUDIT_PORT: "${ENVECTOR_AUDIT_PORT:-50052}"
      ENVECTOR_AUDIT_HTTP_PORT: "${ENVECTOR_AUDIT_HTTP_PORT:-58052}"
      AUDIT_EXPORT_REQUIRE_PRINCIPAL: "${AUDIT_EXPORT_REQUIRE_PRINCIPAL:-true}"
      ENVECTOR_AUDIT_AUTH_OIDC_ISSUER: "${ENVECTOR_AUDIT_AUTH_OIDC_ISSUER:-}"
      ENVECTOR_AUDIT_AUTH_JWKS_URL: "${ENVECTOR_AUDIT_AUTH_JWKS_URL:-}"
      ENVECTOR_AUDIT_AUTH_EXPECTED_ISSUER: "${ENVECTOR_AUDIT_AUTH_EXPECTED_ISSUER:-}"
      ENVECTOR_AUDIT_AUTH_ALLOWED_AUDIENCES: "${ENVECTOR_AUDIT_AUTH_ALLOWED_AUDIENCES:-}"
      ENVECTOR_JWT_LEEWAY_SECONDS: "${ENVECTOR_JWT_LEEWAY_SECONDS:-0}"
      # audit log mq
      ENVECTOR_AUDIT_KAFKA_BOOTSTRAP_SERVERS: "${ENVECTOR_AUDIT_KAFKA_BOOTSTRAP_SERVERS:-audit-logmq:9092}"
      ENVECTOR_AUDIT_KAFKA_TOPIC: "${ENVECTOR_AUDIT_KAFKA_TOPIC:-envector.audit.events.v1}"
      ENVECTOR_AUDIT_KAFKA_GROUP_ID: "${ENVECTOR_AUDIT_KAFKA_GROUP_ID:-envector-audit-service}"
      # storage
      ENVECTOR_STORAGE_PROVIDER: "${ENVECTOR_AUDIT_STORAGE_PROVIDER:-s3}"
      ENVECTOR_STORAGE_ADDRESS: "${ENVECTOR_AUDIT_STORAGE_ADDRESS:-storage:59000}"
      ENVECTOR_STORAGE_BUCKET_NAME: "${ENVECTOR_AUDIT_STORAGE_BUCKET_NAME:-envector-audit}"
      ENVECTOR_STORAGE_USER: "${ENVECTOR_AUDIT_STORAGE_USER:-${ENVECTOR_STORAGE_USER:-minioadmin}}"
      ENVECTOR_STORAGE_PASSWORD: "${ENVECTOR_AUDIT_STORAGE_PASSWORD:-${ENVECTOR_STORAGE_PASSWORD:-.}}"
      ENVECTOR_STORAGE_SECURE: "${ENVECTOR_AUDIT_STORAGE_SECURE:-false}"
      ENVECTOR_STORAGE_REGION: "${ENVECTOR_AUDIT_STORAGE_REGION:-us-east-1}"
    depends_on:
      audit-logmq:
        condition: service_healthy
      storage:
        condition: service_healthy
      # When using a dedicated audit storage instance, replace the dependency above with:
      # audit-storage:
      #   condition: service_healthy
      # When AUDIT_EXPORT_REQUIRE_PRINCIPAL is true, ensure Keycloak container
      # has started. JWKS fetch is lazy-retried, so service_started is enough.
      keycloak:
        condition: service_started

  # Uncomment separate audit storage in production mode
  # ENVECTOR_AUDIT_STORAGE_ADDRESS=audit-storage:${ENVECTOR_AUDIT_STORAGE_PORT:-59000}
  # when you want audit logs to land in a MinIO instance separate from the data-plane storage.
  # audit-storage:
  #   image: minio/minio:RELEASE.2023-03-20T20-16-18Z
  #   restart: on-failure:10
  #   command: server /data --address ":${ENVECTOR_AUDIT_STORAGE_PORT:-59000}" --console-address ":${ENVECTOR_AUDIT_STORAGE_CONSOLE_PORT:-59001}"
  #   # volumes:
  #   #   - ${DOCKER_VOLUME_DIRECTORY:-./volumes}/minio/data:/data
  #   environment:
  #     MINIO_ROOT_USER: "${ENVECTOR_AUDIT_STORAGE_USER:-minioadmin}"
  #     MINIO_ROOT_PASSWORD: "${ENVECTOR_AUDIT_STORAGE_PASSWORD:-.}"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:${ENVECTOR_AUDIT_STORAGE_PORT:-59000}/minio/health/live"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 20

  audit-logagent:
    image: timberio/vector:0.53.0-debian
    restart: on-failure:10
    command: ["--config", "/etc/vector/vector.yaml"]
    environment:
      ENVECTOR_AUDIT_KAFKA_BOOTSTRAP_SERVERS: "${ENVECTOR_AUDIT_KAFKA_BOOTSTRAP_SERVERS:-audit-logmq:9092}"
      ENVECTOR_AUDIT_KAFKA_TOPIC: "${ENVECTOR_AUDIT_KAFKA_TOPIC:-envector.audit.events.v1}"
    volumes:
      - ${START_ENVECTOR_COMPOSE_DIR:-.}/audit/audit-vector.yaml:/etc/vector/vector.yaml:ro
      - auditlogs:${AUDIT_LOG_DIR:-/var/log/envector/audit}:ro
      - audit-logagent-data:/vector-data-dir
    depends_on:
      audit-logmq:
        condition: service_healthy

  audit-logmq:
    image: redpandadata/redpanda:v25.3.10
    restart: on-failure:10
    entrypoint: ["/bin/sh", "/scripts/redpanda-init.sh"]
    environment:
      ENVECTOR_AUDIT_KAFKA_PORT: "${ENVECTOR_AUDIT_KAFKA_PORT:-9092}"
      ENVECTOR_AUDIT_KAFKA_TOPIC: "${ENVECTOR_AUDIT_KAFKA_TOPIC:-envector.audit.events.v1}"
    command:
      - rpk
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --default-log-level=${ENVECTOR_AUDIT_LOGMQ_DEFAULT_LOG_LEVEL:-warn}
      - --kafka-addr=PLAINTEXT://0.0.0.0:${ENVECTOR_AUDIT_KAFKA_PORT:-9092}
      - --advertise-kafka-addr=PLAINTEXT://audit-logmq:${ENVECTOR_AUDIT_KAFKA_PORT:-9092}
      - --pandaproxy-addr=PLAINTEXT://0.0.0.0:${ENVECTOR_AUDIT_PANDAPROXY_PORT:-9091}
      - --advertise-pandaproxy-addr=PLAINTEXT://audit-logmq:${ENVECTOR_AUDIT_PANDAPROXY_PORT:-9091}
    volumes:
      - ${START_ENVECTOR_COMPOSE_DIR:-.}/audit/redpanda-init.sh:/scripts/redpanda-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:${ENVECTOR_AUDIT_KAFKA_PORT:-9092} >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  auditlogs:
  audit-logagent-data:

networks:
  default:
